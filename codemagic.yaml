# Codemagic CI/CD 配置
# 免费额度: 500 分钟/月 macOS 构建
# 使用: 上传到 GitHub → 在 codemagic.io 连接仓库 → 自动构建

workflows:
  build-qnet:
    name: Build QNET IPA
    instance_type: mac_mini_m1
    max_build_duration: 20
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate project
        script: xcodegen generate
      - name: Build
        script: |
          xcodebuild archive \
            -project QNET_Simple.xcodeproj \
            -scheme QNET \
            -archivePath ./QNET.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
      - name: Package IPA
        script: |
          mkdir -p Payload
          cp -R ./QNET.xcarchive/Products/Applications/QNET.app ./Payload/
          zip -qr QNET_Simple.ipa Payload/
    artifacts:
      - QNET_Simple.ipa
